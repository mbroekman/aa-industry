{% extends "industry_reforged/base.html" %}
{% load i18n django_bootstrap5 %}

{% block details %}
<div class="container-fluid">
    <div class="row mb-3">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <h3><i class="fas fa-edit"></i> {{ title }}</h3>
            <a href="{% url back_url %}{{ back_hash|default:'' }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> {% trans "Back" %}</a>
        </div>
    </div>

    <div class="row">
        <div class="col-12 col-md-8 mx-auto">
            <div class="card border-0 mb-4">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {% bootstrap_form form %}

                        <div class="mt-4 text-end">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> {% trans "Save Configuration" %}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
